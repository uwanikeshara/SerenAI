name: serenai
description: SerenAI - Real-time stress detection and mindfulness app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.1

  # Supabase
  supabase_flutter: ^2.5.3

  # Local DB (offline support)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # ML / Camera
  camera: ^0.11.0+2
  tflite_flutter: ^0.12.0
  google_mlkit_face_detection: ^0.11.0
  image: ^4.2.0

  # Audio
  just_audio: ^0.9.40
  wakelock_plus: ^1.1.4

  # Charts
  fl_chart: ^0.68.0

  # UI / Animations
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1

  # Utilities
  shared_preferences: ^2.3.1
  intl: ^0.19.0
  uuid: ^4.4.0
  http: ^1.2.1
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  flutter_volume_controller: ^1.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/images/

  # fonts:
